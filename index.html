<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self' https://pqngmvixfcsrvsvrtbfj.supabase.co; form-action 'none'; base-uri 'none'">
<title>КУРАТОР</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--glass:rgba(255,255,255,0.04);--gb:rgba(255,255,255,0.08);--gh:rgba(255,255,255,0.07);--t1:#e8e8f0;--t2:#8888aa;--t3:#555570;--ac:#7c6bf0;--acd:rgba(124,107,240,0.15);--dg:#e05555;--bl:20px;--r:16px;--rs:10px}
html{font-size:15px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;top:-40%;left:-20%;width:80vw;height:80vw;background:radial-gradient(circle,rgba(100,70,220,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-30%;right:-10%;width:60vw;height:60vw;background:radial-gradient(circle,rgba(50,120,220,.08) 0%,transparent 70%);pointer-events:none;z-index:0}
.layout{position:relative;z-index:1;display:flex;min-height:100vh;max-width:1400px;margin:0 auto}
.sidebar{width:260px;min-width:260px;padding:32px 20px;border-right:1px solid var(--gb);display:flex;flex-direction:column;gap:24px}
.logo{text-align:center;padding-bottom:8px}
.logo h1{font-size:1.1rem;font-weight:300;letter-spacing:.5em;color:var(--t2)}
.btn-today{width:100%;background:var(--acd);border:1px solid rgba(124,107,240,.2);color:var(--ac);font-family:inherit;font-size:.75rem;font-weight:500;letter-spacing:.1em;padding:10px;border-radius:var(--rs);cursor:pointer;transition:all .2s}
.btn-today:hover{background:rgba(124,107,240,.25)}
.btn-today.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.calendar{background:var(--glass);backdrop-filter:blur(var(--bl));-webkit-backdrop-filter:blur(var(--bl));border:1px solid var(--gb);border-radius:var(--r);padding:16px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-header span{font-size:.8rem;font-weight:400;color:var(--t2)}
.cal-nav{background:none;border:none;color:var(--t3);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:6px;transition:color .2s}
.cal-nav:hover{color:var(--t1)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.cal-weekdays span{text-align:center;font-size:.6rem;font-weight:500;color:var(--t3);letter-spacing:.05em;padding:4px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{text-align:center;font-size:.75rem;padding:6px 2px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--t2);position:relative}
.cal-day:hover{background:rgba(255,255,255,.06)}
.cal-day.other{color:var(--t3);opacity:.4}
.cal-day.today{color:var(--ac);font-weight:600}
.cal-day.selected{background:var(--ac);color:#fff;font-weight:500}
.cal-day.has-notes::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--ac)}
.cal-day.selected.has-notes::after{background:#fff}
.cal-counts{margin-top:14px;padding-top:10px;border-top:1px solid var(--gb)}
.cal-stat{display:flex;justify-content:space-between;font-size:.65rem;color:var(--t3);padding:3px 0}
.cal-stat span:last-child{color:var(--t2);font-variant-numeric:tabular-nums}
.main{flex:1;padding:32px 36px;display:flex;flex-direction:column;min-width:0}
.day-title{font-size:1.3rem;font-weight:300;color:var(--t1);margin-bottom:4px}
.day-subtitle{font-size:.7rem;color:var(--t3);letter-spacing:.1em;margin-bottom:28px}
.input-wrapper{background:var(--glass);backdrop-filter:blur(var(--bl));-webkit-backdrop-filter:blur(var(--bl));border:1px solid var(--gb);border-radius:var(--r);padding:4px;margin-bottom:8px;transition:border-color .3s,box-shadow .3s}
.input-wrapper:focus-within{border-color:rgba(124,107,240,.3);box-shadow:0 0 40px rgba(124,107,240,.08)}
.input-wrapper textarea{width:100%;background:transparent;border:none;outline:none;color:var(--t1);font-family:inherit;font-size:.95rem;font-weight:300;line-height:1.7;padding:16px 20px;resize:none;min-height:48px;max-height:200px}
.input-wrapper textarea::placeholder{color:var(--t3)}
.input-footer{display:flex;justify-content:space-between;align-items:center;padding:0 16px 10px}
.char-count{font-size:.7rem;color:var(--t3);font-variant-numeric:tabular-nums}
.btn-save{background:var(--acd);border:1px solid rgba(124,107,240,.2);color:var(--ac);font-family:inherit;font-size:.75rem;font-weight:500;letter-spacing:.08em;padding:8px 24px;border-radius:var(--rs);cursor:pointer;transition:all .2s}
.btn-save:hover{background:rgba(124,107,240,.25)}
.btn-save:active{transform:scale(.97)}
.input-hint{font-size:.6rem;color:var(--t3);padding:2px 4px 20px;letter-spacing:.03em}
.suggest{display:none;font-size:.72rem;color:var(--t3);padding:8px 4px 0;letter-spacing:.03em;font-style:italic;animation:fadeUp .3s ease}
.search-row{display:flex;gap:12px;margin-bottom:28px}
.search-row input{flex:1;background:var(--glass);backdrop-filter:blur(var(--bl));-webkit-backdrop-filter:blur(var(--bl));border:1px solid var(--gb);border-radius:var(--rs);padding:11px 16px;color:var(--t1);font-family:inherit;font-size:.85rem;font-weight:300;outline:none;transition:border-color .3s}
.search-row input:focus{border-color:rgba(124,107,240,.3)}
.search-row input::placeholder{color:var(--t3)}
.stats{font-size:.7rem;color:var(--t3);letter-spacing:.08em;margin-bottom:24px}
.groups{display:flex;flex-direction:column;gap:28px}
.group{animation:fadeUp .4s ease both}
.group:nth-child(2){animation-delay:.05s}
.group:nth-child(3){animation-delay:.1s}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.group-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-left:2px}
.group-title{font-size:.7rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t2)}
.group-count{font-size:.6rem;color:var(--t3);background:rgba(255,255,255,.04);padding:2px 8px;border-radius:20px}
.group-line{flex:1;height:1px;background:linear-gradient(90deg,var(--gb),transparent)}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.note-card{background:var(--glass);backdrop-filter:blur(var(--bl));-webkit-backdrop-filter:blur(var(--bl));border:1px solid var(--gb);border-radius:var(--r);padding:18px;transition:all .25s;animation:fadeUp .35s ease both}
.note-card:hover{background:var(--gh);border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.note-content{font-size:.9rem;font-weight:300;line-height:1.7;color:var(--t1);white-space:pre-wrap;word-break:break-word;margin-bottom:12px}
.note-meta{display:flex;justify-content:space-between;align-items:center}
.note-date{font-size:.6rem;color:var(--t3);font-variant-numeric:tabular-nums}
.note-delete{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.7rem;padding:4px 8px;border-radius:6px;transition:all .2s}
.note-delete:hover{color:var(--dg);background:rgba(224,85,85,.1)}
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-state .icon{font-size:2rem;margin-bottom:14px;opacity:.3}
.empty-state p{font-size:.85rem;font-weight:300}
.skeleton{display:flex;flex-direction:column;gap:12px}
.skel-card{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);padding:18px;animation:pulse 1.5s ease infinite}
.skel-line{height:10px;border-radius:4px;background:rgba(255,255,255,.06)}
.skel-line.w60{width:60%}
.skel-line.w80{width:80%}
.skel-line.w40{width:40%}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(20,20,40,.9);backdrop-filter:blur(16px);border:1px solid var(--gb);color:var(--t1);font-size:.8rem;padding:12px 28px;border-radius:40px;opacity:0;transition:all .4s cubic-bezier(.22,1,.36,1);pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.offline{border-color:rgba(224,85,85,.3);color:var(--dg)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;margin-left:8px;animation:pulse 2s infinite}
.sync-dot.offline{background:var(--dg);animation:none}
.lock-overlay{position:fixed;inset:0;background:rgba(10,10,26,.95);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;z-index:200}
.lock-box{background:var(--glass);border:1px solid var(--gb);border-radius:20px;padding:40px 36px;max-width:340px;width:90%;text-align:center}
.lock-box h2{font-size:1rem;font-weight:300;letter-spacing:.3em;color:var(--t2);margin-bottom:6px}
.lock-box p{font-size:.72rem;color:var(--t3);margin-bottom:24px;line-height:1.6}
.lock-box input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--gb);border-radius:var(--rs);padding:12px 16px;color:var(--t1);font-family:inherit;font-size:.9rem;font-weight:300;text-align:center;outline:none;margin-bottom:16px;transition:border-color .2s}
.lock-box input:focus{border-color:rgba(124,107,240,.4)}
.lock-box input::placeholder{color:var(--t3)}
.lock-box button{width:100%;background:var(--acd);border:1px solid rgba(124,107,240,.2);color:var(--ac);font-family:inherit;font-size:.75rem;font-weight:500;letter-spacing:.1em;padding:12px;border-radius:var(--rs);cursor:pointer;transition:all .2s}
.lock-box button:hover{background:rgba(124,107,240,.25)}
.lock-box .lock-err{font-size:.65rem;color:var(--dg);margin-top:8px;display:none}
.key-info{font-size:.6rem;color:var(--t3);letter-spacing:.05em;padding:8px 0;border-top:1px solid var(--gb);margin-top:auto;text-align:center;cursor:pointer;transition:color .2s}
.key-info:hover{color:var(--t2)}
@media(max-width:800px){.layout{flex-direction:column}.sidebar{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--gb);padding:20px 16px}.main{padding:20px 16px}.notes-grid{grid-template-columns:1fr}.calendar{max-width:320px;margin:0 auto}.note-delete{opacity:1}}
</style>
</head>
<body>
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <h2>КУРАТОР</h2>
    <p>Введи ключ доступа — одно слово, которое будет работать на всех твоих устройствах</p>
    <input type="password" id="lockInput" placeholder="ключ" autocomplete="off">
    <button id="lockBtn">ВОЙТИ</button>
    <div class="lock-err" id="lockErr">введи ключ</div>
  </div>
</div>
<div class="layout" id="appLayout" style="display:none">
  <aside class="sidebar">
    <div class="logo"><h1>КУРАТОР <span class="sync-dot" id="syncDot" title="синхронизировано"></span></h1></div>
    <button class="btn-today" id="btnToday">СЕГОДНЯ</button>
    <div class="calendar">
      <div class="cal-header">
        <button class="cal-nav" data-dir="-1">&#8249;</button>
        <span id="calMonth"></span>
        <button class="cal-nav" data-dir="1">&#8250;</button>
      </div>
      <div class="cal-weekdays"><span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span></div>
      <div class="cal-days" id="calDays"></div>
      <div class="cal-counts" id="calCounts"></div>
    </div>
    <div class="key-info" id="keyInfo" title="выйти"></div>
  </aside>
  <main class="main">
    <div class="day-title" id="dayTitle"></div>
    <div class="day-subtitle" id="daySubtitle"></div>
    <div class="input-wrapper">
      <textarea id="noteInput" placeholder="Запиши мысль..." rows="1"></textarea>
      <div class="input-footer">
        <span class="char-count" id="charCount">0</span>
        <button class="btn-save" id="saveBtn">СОХРАНИТЬ</button>
      </div>
    </div>
    <div class="input-hint">Enter — сохранить · Shift+Enter — новая строка</div>
    <div class="suggest" id="suggest"></div>
    <div class="search-row"><input type="text" id="searchInput" placeholder="Поиск..."></div>
    <div class="stats" id="stats"></div>
    <div class="groups" id="groups"></div>
    <div class="empty-state" id="emptyState"><div class="icon">&#9671;</div><p>Напиши первую заметку</p></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
