<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>КУРАТОР</title>
<!-- v2.1.0 -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--glass:rgba(255,255,255,0.03);--gb:rgba(255,255,255,0.06);--gh:rgba(255,255,255,0.05);--t1:#e8e8f0;--t2:#8888aa;--t3:#555570;--ac:#7c6bf0;--acd:rgba(124,107,240,0.12);--green:#4caf50;--dg:#e05555;--bl:24px;--r:20px;--rs:12px}
html{font-size:15px}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;top:-30%;left:-15%;width:70vw;height:70vw;background:radial-gradient(circle,rgba(100,70,220,.08) 0%,transparent 70%);pointer-events:none;z-index:0}

.lock-overlay{position:fixed;inset:0;background:rgba(10,10,26,.96);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:center;z-index:200}
.lock-box{background:var(--glass);border:1px solid var(--gb);border-radius:24px;padding:48px 40px;max-width:360px;width:90%;text-align:center}
.lock-box h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;color:var(--t1);margin-bottom:8px;letter-spacing:.05em}
.lock-box p{font-size:.72rem;color:var(--t3);margin-bottom:28px;line-height:1.7}
.lock-box input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--gb);border-radius:var(--rs);padding:14px 18px;color:var(--t1);font-family:inherit;font-size:.95rem;text-align:center;outline:none;margin-bottom:18px;transition:border-color .2s}
.lock-box input:focus{border-color:rgba(124,107,240,.4)}
.lock-box input::placeholder{color:var(--t3)}
.lock-box button{width:100%;background:var(--acd);border:1px solid rgba(124,107,240,.2);color:var(--ac);font-family:inherit;font-size:.8rem;font-weight:500;letter-spacing:.1em;padding:13px;border-radius:var(--rs);cursor:pointer;transition:all .2s}
.lock-box button:hover{background:rgba(124,107,240,.22)}

.app{position:relative;z-index:1;display:flex;min-height:100vh;max-width:1500px;margin:0 auto}
.sidebar{width:280px;min-width:280px;padding:36px 24px;border-right:1px solid var(--gb);display:flex;flex-direction:column;gap:20px}
.logo{text-align:center;padding-bottom:4px}
.logo h1{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:400;letter-spacing:.15em;color:var(--t2)}
.logo-sub{font-size:.55rem;color:var(--t3);letter-spacing:.2em;margin-top:4px}
.nav-btn{width:100%;background:var(--glass);border:1px solid var(--gb);color:var(--t2);font-family:inherit;font-size:.72rem;font-weight:500;letter-spacing:.08em;padding:11px;border-radius:var(--rs);cursor:pointer;transition:all .2s;text-align:left}
.nav-btn:hover{background:var(--gh);color:var(--t1)}
.nav-btn.active{background:var(--acd);border-color:rgba(124,107,240,.2);color:var(--ac)}
.territories{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px}
.territories::-webkit-scrollbar{width:3px}
.territories::-webkit-scrollbar-thumb{background:var(--gb);border-radius:3px}
.territory{padding:10px 14px;border-radius:var(--rs);cursor:pointer;transition:all .2s;border:1px solid transparent}
.territory:hover{background:var(--gh)}
.territory.active{background:var(--acd);border-color:rgba(124,107,240,.15)}
.territory-name{font-size:.78rem;font-weight:400;color:var(--t1);margin-bottom:3px}
.territory-meta{font-size:.6rem;color:var(--t3);display:flex;gap:8px}
.key-info{font-size:.55rem;color:var(--t3);letter-spacing:.05em;padding:8px 0;border-top:1px solid var(--gb);text-align:center;cursor:pointer;transition:color .2s}
.key-info:hover{color:var(--t2)}

.main{flex:1;padding:36px 40px;display:flex;flex-direction:column;min-width:0}
.view-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:28px}
.view-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:400;color:var(--t1)}
.view-sub{font-size:.65rem;color:var(--t3);letter-spacing:.08em}
.search-row{margin-bottom:24px}
.search-row input{width:100%;background:var(--glass);border:1px solid var(--gb);border-radius:var(--rs);padding:12px 18px;color:var(--t1);font-family:inherit;font-size:.85rem;outline:none;transition:border-color .3s}
.search-row input:focus{border-color:rgba(124,107,240,.3)}
.search-row input::placeholder{color:var(--t3)}

.editor-overlay{position:fixed;inset:0;background:rgba(10,10,26,.92);backdrop-filter:blur(16px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.editor-overlay.open{opacity:1;pointer-events:all}
.editor{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);width:90%;max-width:720px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.editor-toolbar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--gb)}
.editor-toolbar .type-btns{display:flex;gap:6px}
.type-btn{background:none;border:1px solid var(--gb);color:var(--t3);font-family:inherit;font-size:.65rem;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all .2s}
.type-btn.active{background:var(--acd);border-color:rgba(124,107,240,.2);color:var(--ac)}
.editor-actions{display:flex;gap:8px}
.editor-actions button{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.7rem;padding:6px 12px;border-radius:8px;transition:all .2s}
.editor-actions button:hover{color:var(--t1);background:var(--gh)}
.editor-actions .btn-primary{background:var(--acd);border:1px solid rgba(124,107,240,.2);color:var(--ac)}
.editor-actions .btn-primary:hover{background:rgba(124,107,240,.22)}
.editor textarea{flex:1;background:transparent;border:none;outline:none;color:var(--t1);font-family:'Inter',sans-serif;font-size:.92rem;line-height:1.8;padding:24px;resize:none;min-height:300px}
.editor textarea::placeholder{color:var(--t3)}
.editor-footer{padding:12px 24px;border-top:1px solid var(--gb);display:flex;justify-content:space-between;align-items:center}
.editor-footer .hint{font-size:.6rem;color:var(--t3)}
.editor-footer .char-count{font-size:.6rem;color:var(--t3);font-variant-numeric:tabular-nums}

.connections-panel{border-top:1px solid var(--gb);padding:16px 24px;max-height:150px;overflow-y:auto}
.connections-panel h4{font-size:.6rem;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.conn-list{display:flex;flex-wrap:wrap;gap:6px}
.conn-chip{background:var(--gh);border:1px solid var(--gb);border-radius:20px;padding:4px 12px;font-size:.65rem;color:var(--t2);cursor:pointer;transition:all .2s}
.conn-chip:hover{background:var(--acd);border-color:rgba(124,107,240,.2);color:var(--ac)}

.content-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px;padding-right:8px}
.content-area::-webkit-scrollbar{width:3px}
.content-area::-webkit-scrollbar-thumb{background:var(--gb);border-radius:3px}

.note-card{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);padding:24px;transition:all .3s;cursor:pointer;animation:fadeUp .4s ease both}
.note-card:hover{background:var(--gh);border-color:rgba(255,255,255,.1);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.note-card.essay{border-left:3px solid rgba(124,107,240,.3)}
.note-type{font-size:.55rem;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px}
.note-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:400;color:var(--t1);margin-bottom:10px;line-height:1.4}
.note-preview{font-size:.82rem;font-weight:300;line-height:1.7;color:var(--t2);display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap}
.note-meta{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:10px;border-top:1px solid var(--gb)}
.note-date{font-size:.6rem;color:var(--t3);font-variant-numeric:tabular-nums}
.note-conns{font-size:.6rem;color:var(--ac)}
.note-delete{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.65rem;padding:4px 8px;border-radius:6px;transition:all .2s}
.note-delete:hover{color:var(--dg);background:rgba(224,85,85,.1)}

.timeline{display:flex;flex-direction:column;gap:0;position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:linear-gradient(180deg,var(--gb),transparent)}
.timeline-item{position:relative;padding:16px 0 16px 20px;animation:fadeUp .3s ease both}
.timeline-item::before{content:'';position:absolute;left:-17px;top:22px;width:7px;height:7px;border-radius:50%;background:var(--ac);border:2px solid var(--bg)}
.timeline-date{font-size:.6rem;color:var(--t3);margin-bottom:6px;letter-spacing:.05em}

.empty-state{text-align:center;padding:80px 20px;color:var(--t3)}
.empty-state .icon{font-size:2.5rem;margin-bottom:16px;opacity:.2}
.empty-state p{font-size:.85rem;font-weight:300;line-height:1.6}

.skeleton{display:flex;flex-direction:column;gap:14px}
.skel-card{background:var(--glass);border:1px solid var(--gb);border-radius:var(--r);padding:24px;animation:pulse 1.5s ease infinite}
.skel-line{height:10px;border-radius:4px;background:rgba(255,255,255,.05)}
.skel-line.w60{width:60%}.skel-line.w80{width:80%}.skel-line.w40{width:40%}.skel-line.w30{width:30%}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(20,20,40,.92);backdrop-filter:blur(16px);border:1px solid var(--gb);color:var(--t1);font-size:.8rem;padding:12px 28px;border-radius:40px;opacity:0;transition:all .4s cubic-bezier(.22,1,.36,1);pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.fab{position:fixed;bottom:32px;right:32px;width:56px;height:56px;background:var(--ac);border:none;border-radius:50%;color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 8px 32px rgba(124,107,240,.4);transition:all .3s;z-index:50;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.08);box-shadow:0 12px 40px rgba(124,107,240,.5)}
.fab:active{transform:scale(.95)}

@media(max-width:800px){.app{flex-direction:column}.sidebar{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--gb);padding:20px 16px;max-height:200px;overflow-y:auto}.main{padding:20px 16px}.editor{width:95%}.fab{bottom:20px;right:20px}}
</style>
</head>
<body>
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-box">
    <h2>КУРАТОР</h2>
    <p>пространство для мыслей, которые растут</p>
    <input type="password" id="lockInput" placeholder="ключ" autocomplete="off">
    <button id="lockBtn">ВОЙТИ</button>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <aside class="sidebar">
    <div class="logo">
      <h1>КУРАТОР</h1>
      <div class="logo-sub">living thought space</div>
    </div>
    <button class="nav-btn active" id="navAll" onclick="switchView('all')">ВСЕ ЗАМЕТКИ</button>
    <button class="nav-btn" id="navTerr" onclick="switchView('territories')">ТЕРРИТОРИИ</button>
    <button class="nav-btn" id="navTime" onclick="switchView('timeline')">ВРЕМЕННАЯ НИТЬ</button>
    <div class="territories" id="territories"></div>
    <div class="key-info" id="keyInfo" onclick="lockApp()"></div>
  </aside>
  <main class="main">
    <div class="view-header">
      <div class="view-title" id="viewTitle">Все заметки</div>
      <div class="view-sub" id="viewSub"></div>
    </div>
    <div class="search-row"><input type="text" id="searchInput" placeholder="найти мысль..."></div>
    <div class="content-area" id="contentArea"></div>
  </main>
</div>

<div class="editor-overlay" id="editorOverlay">
  <div class="editor">
    <div class="editor-toolbar">
      <div class="type-btns">
        <button class="type-btn active" data-type="impulse" onclick="setType('impulse')">ИМПУЛЬС</button>
        <button class="type-btn" data-type="essay" onclick="setType('essay')">ЭССЕ</button>
      </div>
      <div class="editor-actions">
        <button onclick="closeEditor()">ОТМЕНА</button>
        <button class="btn-primary" onclick="saveNote()">СОХРАНИТЬ</button>
      </div>
    </div>
    <textarea id="editorInput" placeholder="пиши..."></textarea>
    <div class="editor-footer">
      <span class="hint">Enter — новая строка · сохраняется кнопкой</span>
      <span class="char-count" id="editorCount">0</span>
    </div>
    <div class="connections-panel" id="connectionsPanel" style="display:none">
      <h4>связанные мысли</h4>
      <div class="conn-list" id="connList"></div>
    </div>
  </div>
</div>

<button class="fab" id="fab" onclick="openEditor()">+</button>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://pqngmvixfcsrvsvrtbfj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxbmdtdml4ZmNzcnZzdnJ0YmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNzY0NDcsImV4cCI6MjA5OTk1MjQ0N30.nbO6rSANWaWRRxnRvrwlrawkBT2DP0VZ1GuyR6C2nHE';
const API = SUPABASE_URL + '/rest/v1/notes';
const $ = s => document.querySelector(s);

let USER_ID = '';
let headers = {};
let allNotes = [];
let currentView = 'all';
let currentTerritory = null;
let editingId = null;
let currentType = 'impulse';
let connections = [];

function setKey(key) {
  USER_ID = key;
  headers = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=representation', 'x-user-id': USER_ID };
  localStorage.setItem('kurator_key', USER_ID);
}
function lockApp() { localStorage.removeItem('kurator_key'); location.reload(); }

function initLock() {
  const saved = localStorage.getItem('kurator_key');
  if (saved) { setKey(saved); startApp(); return; }
  const overlay = $('#lockOverlay');
  const input = $('#lockInput');
  const btn = $('#lockBtn');
  overlay.style.display = 'flex';
  setTimeout(() => { try { input.focus(); } catch(e) {} }, 300);
  function submit() {
    const v = input.value.trim();
    if (!v) return;
    setKey(v.toLowerCase());
    overlay.style.display = 'none';
    startApp();
  }
  btn.addEventListener('click', e => { e.preventDefault(); submit(); });
  btn.addEventListener('touchend', e => { e.preventDefault(); submit(); });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}

function startApp() {
  try {
    $('#app').style.display = 'flex';
    $('#keyInfo').textContent = USER_ID;
    showSkeleton();
    loadNotes();
  } catch(e) { console.error('startApp error:', e); }
}

async function api(method, path, body) {
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(r.status);
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

async function loadNotes() {
  showSkeleton();
  try {
    const data = await api('GET', '?user_id=eq.' + USER_ID + '&order=created_at.desc');
    allNotes = Array.isArray(data) ? data : [];
  } catch (e) {
    allNotes = [];
    if (!navigator.onLine) toast('нет интернета');
  }
  renderAll();
}

function renderAll() {
  renderTerritories();
  renderContent();
}

function renderTerritories() {
  const ter = {};
  allNotes.forEach(n => {
    const t = n.territory || guessTerritory(n.content);
    if (!ter[t]) ter[t] = { name: t, count: 0, latest: n.created_at };
    ter[t].count++;
    if (n.created_at > ter[t].latest) ter[t].latest = n.created_at;
  });
  const sorted = Object.values(ter).sort((a, b) => b.count - a.count);
  let html = '';
  sorted.forEach(t => {
    const active = currentView === 'territories' && currentTerritory === t.name;
    html += '<div class="territory' + (active ? ' active' : '') + '" onclick="selectTerritory(\'' + esc(t.name) + '\')">' +
      '<div class="territory-name">' + esc(t.name) + '</div>' +
      '<div class="territory-meta"><span>' + t.count + '</span><span>' + timeAgo(t.latest) + '</span></div></div>';
  });
  $('#territories').innerHTML = html;
}

function guessTerritory(text) {
  const lower = text.toLowerCase();
  const themes = [
    ['свобод', 'освобожд', 'выбор', 'автоном', 'вол'],
    ['идентичност', 'я ', 'самость', 'личност', 'кто я'],
    ['деньг', 'финанс', 'доход', 'заработ', 'бизнес', '$', 'kurator'],
    ['смысл', 'цель', 'миссия', 'призван', 'предначерт'],
    ['отношен', 'связ', 'коммуника', 'диалог', 'близост'],
    ['творчеств', 'создан', 'вдохновен', 'искусств', 'красот'],
    ['мышлен', 'осознан', 'рефлекс', 'паттерн', 'пониман'],
    ['технолог', 'цифров', 'ai', 'искусственн', 'алгоритм'],
    ['философ', 'теор', 'концепц', 'идей', 'постулат'],
    ['здоров', 'тел', 'энерг', 'ресурс', 'выгоран'],
  ];
  for (const [i, words] of themes.entries()) {
    if (words.some(w => lower.includes(w))) return ['свобода', 'идентичность', 'деньги', 'смысл', 'отношения', 'творчество', 'мышление', 'технологии', 'философия', 'здоровье'][i];
  }
  return 'все заметки';
}

function renderContent() {
  const query = $('#searchInput').value.trim().toLowerCase();
  let notes = allNotes;

  if (query) notes = notes.filter(n => n.content.toLowerCase().includes(query));
  if (currentView === 'territories' && currentTerritory) {
    notes = notes.filter(n => (n.territory || guessTerritory(n.content)) === currentTerritory);
  }

  if (currentView === 'timeline') { renderTimeline(notes); return; }

  if (!notes.length) {
    const msg = query ? 'ничего не найдено' : (currentTerritory ? 'пустая территория' : 'начни с первой мысли');
    $('#contentArea').innerHTML = '<div class="empty-state"><div class="icon">&#9671;</div><p>' + msg + '</p></div>';
    $('#viewSub').textContent = '';
    return;
  }

  const essayCount = notes.filter(n => (n.note_type || (n.content.length > 500 ? 'essay' : 'impulse')) === 'essay').length;
  $('#viewSub').textContent = notes.length + ' замет' + (notes.length === 1 ? 'ка' : notes.length < 5 ? 'ки' : 'ок') + (essayCount ? ' · ' + essayCount + ' эссе' : '');

  let html = '';
  notes.forEach((note, i) => {
    const type = note.note_type || (note.content.length > 500 ? 'essay' : 'impulse');
    const isEssay = type === 'essay';
    const title = getFirstLine(note.content);
    const preview = getPreview(note.content);
    const conns = parseConnections(note);
    const date = new Date(note.created_at);
    const dateStr = date.getDate() + ' ' + ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'][date.getMonth()];
    html += '<div class="note-card' + (isEssay ? ' essay' : '') + '" onclick="openNote(' + note.id + ')" style="animation-delay:' + (i * 0.03) + 's">' +
      '<div class="note-type">' + (isEssay ? 'эссе' : 'импульс') + '</div>' +
      '<div class="note-title">' + esc(title) + '</div>' +
      (preview ? '<div class="note-preview">' + esc(preview) + '</div>' : '') +
      '<div class="note-meta"><span class="note-date">' + dateStr + '</span>' +
      (conns.length ? '<span class="note-conns">' + conns.length + ' связей</span>' : '') +
      '<button class="note-delete" onclick="event.stopPropagation();deleteNote(' + note.id + ')">&#10005;</button></div></div>';
  });
  $('#contentArea').innerHTML = html;
}

function renderTimeline(notes) {
  if (!notes.length) {
    $('#contentArea').innerHTML = '<div class="empty-state"><div class="icon">&#9671;</div><p>пока пусто</p></div>';
    $('#viewSub').textContent = '';
    return;
  }
  $('#viewSub').textContent = notes.length + ' записей';
  const byDate = {};
  notes.forEach(n => {
    const d = n.created_at.slice(0, 10);
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(n);
  });
  let html = '<div class="timeline">';
  for (const [date, dayNotes] of Object.entries(byDate)) {
    const d = new Date(date + 'T12:00:00');
    const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const dateLabel = d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
    html += '<div class="timeline-date" style="font-size:.6rem;color:var(--t3);padding:12px 0 4px;letter-spacing:.05em">' + dateLabel + '</div>';
    dayNotes.forEach(note => {
      const type = note.note_type || (note.content.length > 500 ? 'essay' : 'impulse');
      const title = getFirstLine(note.content);
      html += '<div class="timeline-item"><div class="note-card' + (type === 'essay' ? ' essay' : '') + '" onclick="openNote(' + note.id + ')">' +
        '<div class="note-type">' + (type === 'essay' ? 'эссе' : 'импульс') + '</div>' +
        '<div class="note-title">' + esc(title) + '</div>' +
        '<div class="note-meta"><span class="note-date">' + new Date(note.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}) + '</span></div></div></div>';
    });
  }
  html += '</div>';
  $('#contentArea').innerHTML = html;
}

function getFirstLine(text) {
  const first = text.split('\n').find(l => l.trim());
  return first ? first.trim().slice(0, 120) : 'без названия';
}
function getPreview(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length <= 1) return '';
  return lines.slice(1, 4).join(' ').slice(0, 200);
}
function parseConnections(note) {
  if (!note.connections) return [];
  try { return typeof note.connections === 'string' ? JSON.parse(note.connections) : note.connections; } catch(e) { return []; }
}

function switchView(view) {
  currentView = view;
  currentTerritory = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $('#nav' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
  $('#viewTitle').textContent = view === 'all' ? 'Все заметки' : view === 'territories' ? 'Территории' : 'Временная нить';
  renderAll();
}

function selectTerritory(name) {
  currentView = 'territories';
  currentTerritory = name;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $('#navTerr').classList.add('active');
  $('#viewTitle').textContent = name;
  renderAll();
}

function openEditor(note) {
  editingId = note ? note.id : null;
  currentType = note ? (note.note_type || (note.content.length > 500 ? 'essay' : 'impulse')) : 'impulse';
  connections = note ? parseConnections(note) : [];
  $('#editorInput').value = note ? note.content : '';
  $('#editorCount').textContent = (note ? note.content : '').length;
  setType(currentType);
  renderConnections();
  $('#editorOverlay').classList.add('open');
  setTimeout(() => $('#editorInput').focus(), 100);
}
function closeEditor() { $('#editorOverlay').classList.remove('open'); editingId = null; }

function openNote(id) {
  const note = allNotes.find(n => n.id === id);
  if (note) openEditor(note);
}

function setType(type) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
}

function renderConnections() {
  const panel = $('#connectionsPanel');
  if (!allNotes.length || currentView === 'all') { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  const candidates = allNotes.filter(n => n.id !== editingId).slice(0, 20);
  let html = '';
  candidates.forEach(n => {
    const title = getFirstLine(n.content);
    const active = connections.includes(n.id);
    html += '<span class="conn-chip' + (active ? ' active' : '') + '" onclick="toggleConn(' + n.id + ')">' + esc(title.slice(0, 40)) + '</span>';
  });
  $('#connList').innerHTML = html;
}

function toggleConn(id) {
  const idx = connections.indexOf(id);
  if (idx >= 0) connections.splice(idx, 1); else connections.push(id);
  renderConnections();
}

async function saveNote() {
  const content = $('#editorInput').value.trim();
  if (!content) return;
  const territory = guessTerritory(content);
  const payload = {
    content,
    note_type: currentType,
    territory,
    connections: JSON.stringify(connections),
    user_id: USER_ID
  };
  try {
    if (editingId) {
      await api('PATCH', '?id=eq.' + editingId + '&user_id=eq.' + USER_ID, payload);
    } else {
      await api('POST', '', { ...payload, note_date: new Date().toISOString().slice(0, 10) });
    }
    closeEditor();
    toast('сохранено');
    loadNotes();
  } catch (e) {
    toast('ошибка');
  }
}

async function deleteNote(id) {
  if (!confirm('удалить?')) return;
  try {
    await api('DELETE', '?id=eq.' + id + '&user_id=eq.' + USER_ID);
    toast('удалено');
    loadNotes();
  } catch (e) { toast('ошибка'); }
}

function showSkeleton() {
  $('#contentArea').innerHTML = '<div class="skeleton"><div class="skel-card"><div class="skel-line w30"></div><div class="skel-line w80" style="margin-top:10px"></div><div class="skel-line w60" style="margin-top:8px"></div></div><div class="skel-card"><div class="skel-line w40"></div><div class="skel-line w80" style="margin-top:10px"></div></div><div class="skel-card"><div class="skel-line w30"></div><div class="skel-line w60" style="margin-top:10px"></div><div class="skel-line w80" style="margin-top:8px"></div></div></div>';
}

function toast(msg) { const t = $('#toast'); t.textContent = msg; t.className = 'toast show'; setTimeout(() => t.className = 'toast', 2000); }
function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + ' мин';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + ' ч';
  const days = Math.floor(hrs / 24);
  return days + ' д';
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

$('#editorInput').addEventListener('input', () => { $('#editorCount').textContent = $('#editorInput').value.length; });
$('#searchInput').addEventListener('input', renderContent);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditor(); });

initLock();
</script>
</body>
</html>
