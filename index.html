<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c14">
<title>КУРАТОР</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c14;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);--t1:#e0e0ea;--t2:#7a7a96;--t3:#4a4a64;--accent:#8b7ae8;--accent-dim:rgba(139,122,232,0.1);--red:#c05050;--red-dim:rgba(192,80,80,0.08)}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;overflow:hidden}
input,textarea,button{font-family:inherit}

.lock{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:10}
.lock-box{width:100%;max-width:320px;padding:0 24px;text-align:center}
.lock-box h1{font-size:1.1rem;font-weight:400;letter-spacing:.2em;color:var(--t2);margin-bottom:32px}
.lock-box input{width:100%;background:transparent;border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--t1);font-size:.95rem;text-align:center;outline:none;transition:border-color .2s;letter-spacing:.05em}
.lock-box input:focus{border-color:rgba(139,122,232,.3)}
.lock-box input::placeholder{color:var(--t3)}
.lock-box button{width:100%;margin-top:12px;background:var(--accent-dim);border:1px solid rgba(139,122,232,.15);color:var(--accent);font-size:.75rem;font-weight:500;letter-spacing:.12em;padding:12px;border-radius:10px;cursor:pointer;transition:background .2s}
.lock-box button:hover{background:rgba(139,122,232,.18)}
.lock-box .error{color:var(--red);font-size:.7rem;margin-top:10px;min-height:1em}

.app{flex:1;display:none;flex-direction:column;overflow:hidden;max-width:600px;width:100%;margin:0 auto;padding:0 16px}
.header{padding:24px 0 16px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:.85rem;font-weight:400;letter-spacing:.15em;color:var(--t3)}
.header button{background:none;border:none;color:var(--t3);font-size:.65rem;letter-spacing:.08em;cursor:pointer;padding:6px 10px;border-radius:6px;transition:color .2s}
.header button:hover{color:var(--t2)}

.input-row{padding:0 0 12px}
.input-row textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--t1);font-size:.88rem;line-height:1.6;outline:none;resize:none;min-height:52px;max-height:200px;transition:border-color .2s}
.input-row textarea:focus{border-color:rgba(139,122,232,.25)}
.input-row textarea::placeholder{color:var(--t3)}
.input-row .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.input-row .count{font-size:.6rem;color:var(--t3);font-variant-numeric:tabular-nums}
.input-row .send{background:var(--accent-dim);border:1px solid rgba(139,122,232,.15);color:var(--accent);font-size:.65rem;font-weight:500;letter-spacing:.1em;padding:7px 18px;border-radius:8px;cursor:pointer;transition:background .2s}
.input-row .send:hover{background:rgba(139,122,232,.18)}
.input-row .send:disabled{opacity:.3;cursor:default}

.notes{flex:1;overflow-y:auto;padding-bottom:40px}
.notes::-webkit-scrollbar{width:2px}
.notes::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.note{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:8px;position:relative;transition:border-color .2s}
.note:hover{border-color:rgba(255,255,255,.08)}
.note-text{font-size:.85rem;line-height:1.7;color:var(--t1);white-space:pre-wrap;word-break:break-word}
.note-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.note-date{font-size:.55rem;color:var(--t3);font-variant-numeric:tabular-nums}
.note-del{background:none;border:none;color:var(--t3);font-size:.6rem;padding:4px 8px;border-radius:5px;cursor:pointer;transition:color .15s}
.note-del:hover{color:var(--red);background:var(--red-dim)}

.empty{text-align:center;padding:80px 20px;color:var(--t3);font-size:.8rem;line-height:1.7}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(18,18,30,.94);border:1px solid var(--border);color:var(--t1);font-size:.75rem;padding:10px 24px;border-radius:30px;opacity:0;transition:all .3s ease;pointer-events:none;z-index:50;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){.app{padding:0 12px}}
</style>
</head>
<body>

<div class="lock" id="lock">
  <div class="lock-box">
    <h1>КУРАТОР</h1>
    <input type="text" id="keyInput" placeholder="введи ключ" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="enterBtn">ВОЙТИ</button>
    <div class="error" id="lockError"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <h1>КУРАТОР</h1>
    <button id="logoutBtn">выйти</button>
  </div>
  <div class="input-row">
    <textarea id="noteInput" placeholder="напиши мысль..." rows="1"></textarea>
    <div class="row">
      <span class="count" id="charCount"></span>
      <button class="send" id="sendBtn" disabled>СОХРАНИТЬ</button>
    </div>
  </div>
  <div class="notes" id="notesList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB='https://pqngmvixfcsrvsvrtbfj.supabase.co/rest/v1/notes';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxbmdtdml4ZmNzcnZzdnJ0YmZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzNzY0NDcsImV4cCI6MjA5OTk1MjQ0N30.nbO6rSANWaWRRxnRvrwlrawkBT2DP0VZ1GuyR6C2nHE';
const hdrs={'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation'};
let uid='',notes=[];

const $=s=>document.querySelector(s);
const lock=$('lock'),app=$('app'),keyInput=$('keyInput'),enterBtn=$('enterBtn'),lockError=$('lockError');
const noteInput=$('noteInput'),sendBtn=$('sendBtn'),charCount=$('charCount'),notesList=$('notesList'),logoutBtn=$('logoutBtn');

function toast(m){const t=$('toast');t.textContent=m;t.className='toast show';setTimeout(()=>t.className='toast',2200)}

function hdr(u){return{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation','x-user-id':u}}

// === LOCK ===
function tryEnter(){
  const v=keyInput.value.trim();
  if(!v){lockError.textContent='введи ключ';return}
  uid=v.toLowerCase();
  localStorage.setItem('kurator_key',uid);
  showApp();
}
enterBtn.addEventListener('click',tryEnter);
keyInput.addEventListener('keydown',e=>{if(e.key==='Enter')tryEnter()});

function showApp(){
  lock.style.display='none';
  app.style.display='flex';
  loadNotes();
}
logoutBtn.addEventListener('click',()=>{localStorage.removeItem('kurator_key');location.reload()});

// === AUTO-RESIZE TEXTAREA ===
noteInput.addEventListener('input',()=>{
  noteInput.style.height='auto';
  noteInput.style.height=Math.min(noteInput.scrollHeight,200)+'px';
  const v=noteInput.value;
  charCount.textContent=v.length||'';
  sendBtn.disabled=!v.trim();
});

// === SAVE ===
sendBtn.addEventListener('click',save);
noteInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))save();
});
async function save(){
  const text=noteInput.value.trim();
  if(!text)return;
  sendBtn.disabled=true;
  try{
    await fetch(DB,{method:'POST',headers:hdrs(uid),body:JSON.stringify({content:text,user_id:uid,note_date:new Date().toISOString().slice(0,10)})});
    noteInput.value='';noteInput.style.height='auto';charCount.textContent='';sendBtn.disabled=true;
    toast('сохранено');
    loadNotes();
  }catch(e){toast('ошибка сети')}
}

// === LOAD ===
async function loadNotes(){
  try{
    const r=await fetch(DB+'?user_id=eq.'+uid+'&order=created_at.desc',{headers:hdrs(uid)});
    notes=await r.json();
  }catch(e){notes=[]}
  render();
}

// === RENDER ===
function render(){
  if(!notes.length){notesList.innerHTML='<div class="empty">пока пусто<br>напиши первую мысль</div>';return}
  let h='';
  notes.forEach(n=>{
    const d=new Date(n.created_at);
    const ds=d.getDate()+' '+['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()]+' · '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    h+='<div class="note"><div class="note-text">'+esc(n.content)+'</div><div class="note-bottom"><span class="note-date">'+ds+'</span><button class="note-del" data-id="'+n.id+'">удалить</button></div></div>';
  });
  notesList.innerHTML=h;
  notesList.querySelectorAll('.note-del').forEach(b=>{
    b.addEventListener('click',()=>del(b.dataset.id));
  });
}

// === DELETE ===
async function del(id){
  try{
    await fetch(DB+'?id=eq.'+id+'&user_id=eq.'+uid,{method:'DELETE',headers:hdrs(uid)});
    toast('удалено');
    loadNotes();
  }catch(e){toast('ошибка')}
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// === INIT ===
const saved=localStorage.getItem('kurator_key');
if(saved){uid=saved;showApp();setTimeout(()=>noteInput.focus(),100)}
else{setTimeout(()=>keyInput.focus(),100)}
</script>
</body>
</html>
